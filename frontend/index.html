<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP – PO Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold">
    <i class="bi bi-box-seam me-2"></i>ERP PO System
  </span>
  <div class="d-flex gap-2">
    <a href="create_po.html" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-circle me-1"></i>New PO
    </a>
    <button class="btn btn-outline-light btn-sm" id="logoutBtn">
      <i class="bi bi-box-arrow-right me-1"></i>Logout
    </button>
  </div>
</nav>

<!-- ── MAIN CONTENT ── -->
<div class="container-fluid py-4 px-4">

  <!-- STAT CARDS -->
  <div class="row g-3 mb-4">
    <div class="col-sm-6 col-lg-3">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-primary-subtle text-primary">
            <i class="bi bi-file-earmark-text fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">Total POs</div>
            <div class="fw-bold fs-4" id="totalPOs">—</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-success-subtle text-success">
            <i class="bi bi-check-circle fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">Confirmed</div>
            <div class="fw-bold fs-4" id="confirmedPOs">—</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-warning-subtle text-warning">
            <i class="bi bi-clock fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">Draft</div>
            <div class="fw-bold fs-4" id="draftPOs">—</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-info-subtle text-info">
            <i class="bi bi-currency-rupee fs-4"></i>
          </div>
          <div>
            <div class="text-muted small">Total Value</div>
            <div class="fw-bold fs-4" id="totalValue">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PO TABLE -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
      <h5 class="mb-0 fw-semibold">Purchase Orders</h5>
      <input type="text" id="searchInput" class="form-control form-control-sm w-auto"
             placeholder="Search by ref / vendor…"/>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Ref No.</th>
              <th>Vendor</th>
              <th>Items</th>
              <th>Subtotal</th>
              <th>Tax (5%)</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="poTableBody">
            <tr>
              <td colspan="9" class="text-center py-4 text-muted">
                <div class="spinner-border spinner-border-sm me-2"></div>Loading…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- STATUS UPDATE MODAL -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title">Update Status</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modalPoId"/>
        <select class="form-select" id="modalStatus">
          <option value="Draft">Draft</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Received">Received</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-sm" id="confirmStatusBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<!-- Socket.IO client -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- Toast notification container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999" id="toastContainer"></div>

<script>
  // Connect to Node.js notification server
  try {
    const socket = io("http://localhost:3001");

    socket.on("po_status_update", (data) => {
      showToast(
        `📦 ${data.reference_no} status changed: ${data.old_status} → ${data.new_status}`
      );
      // Refresh the PO table automatically
      loadPOs();
    });
  } catch(e) {
    console.warn("Notification server not connected.");
  }

  function showToast(message) {
    const id = "toast-" + Date.now();
    const html = `
      <div id="${id}" class="toast align-items-center text-bg-primary border-0 show mb-2" role="alert">
        <div class="d-flex">
          <div class="toast-body">${message}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto"
                  onclick="document.getElementById('${id}').remove()"></button>
        </div>
      </div>`;
    document.getElementById("toastContainer").insertAdjacentHTML("beforeend", html);
    setTimeout(() => document.getElementById(id)?.remove(), 5000);
  }
</script>
</body>
</html>
