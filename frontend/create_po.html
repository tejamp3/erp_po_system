<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Purchase Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold">
    <i class="bi bi-box-seam me-2"></i>ERP PO System
  </span>
  <a href="index.html" class="btn btn-outline-light btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
  </a>
</nav>

<div class="container py-4" style="max-width:860px">
  <h4 class="fw-bold mb-4">
    <i class="bi bi-file-earmark-plus me-2 text-primary"></i>Create New Purchase Order
  </h4>

  <!-- ALERT BOX (shown on success/error) -->
  <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">

      <!-- VENDOR SELECT -->
      <div class="mb-4">
        <label class="form-label fw-semibold">Vendor <span class="text-danger">*</span></label>
        <select class="form-select" id="vendorSelect">
          <option value="">— Loading vendors… —</option>
        </select>
      </div>

      <!-- NOTES -->
      <div class="mb-4">
        <label class="form-label fw-semibold">Notes</label>
        <textarea class="form-control" id="poNotes" rows="2"
                  placeholder="Optional notes for this order…"></textarea>
      </div>

      <!-- PRODUCT ROWS -->
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-semibold">Products / Line Items</span>
        <button class="btn btn-sm btn-outline-primary" onclick="addRow()">
          <i class="bi bi-plus-circle me-1"></i>Add Row
        </button>
      </div>

      <div class="table-responsive">
        <table class="table align-middle" id="itemsTable">
          <thead class="table-light">
            <tr>
              <th style="min-width:220px">Product</th>
              <th style="width:100px">Qty</th>
              <th style="width:130px">Unit Price (₹)</th>
              <th style="width:130px">Line Total (₹)</th>
              <th style="width:50px"></th>
            </tr>
          </thead>
          <tbody id="itemsBody">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>

      <!-- TOTALS SUMMARY -->
      <div class="d-flex justify-content-end mt-2">
        <div class="border rounded p-3 bg-light" style="min-width:260px">
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Subtotal</span>
            <span id="summarySubtotal">₹0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Tax (5%)</span>
            <span id="summaryTax">₹0.00</span>
          </div>
          <hr class="my-2"/>
          <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Total</span>
            <span id="summaryTotal" class="text-primary">₹0.00</span>
          </div>
        </div>
      </div>

      <!-- SUBMIT -->
      <div class="d-flex justify-content-end mt-4 gap-2">
        <a href="index.html" class="btn btn-outline-secon
