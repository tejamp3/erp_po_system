<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ERP PO System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      border: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-logo {
      width: 56px; height: 56px;
      background: #0d6efd;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: white;
      margin: 0 auto 1rem;
    }
    .btn-primary { border-radius: 8px; padding: .6rem; font-weight: 600; }
    .form-control { border-radius: 8px; }
    .tab-btn {
      flex: 1; border: none; background: #f0f2f5;
      padding: .5rem; font-weight: 500; color: #555;
      transition: all .2s;
    }
    .tab-btn.active { background: #0d6efd; color: white; }
    .tab-btn:first-child { border-radius: 8px 0 0 8px; }
    .tab-btn:last-child  { border-radius: 0 8px 8px 0; }
  </style>
</head>
<body>

<div class="card login-card p-4">

  <!-- Logo -->
  <div class="login-logo"><i class="bi bi-box-seam"></i></div>
  <h5 class="text-center fw-bold mb-1">ERP PO System</h5>
  <p class="text-center text-muted small mb-4">Purchase Order Management</p>

  <!-- Tab switcher -->
  <div class="d-flex mb-4">
    <button class="tab-btn active" id="loginTab"    onclick="switchTab('login')">Login</button>
    <button class="tab-btn"        id="registerTab" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Alert -->
  <div id="alertBox" class="alert d-none mb-3 py-2 small"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="mb-3">
      <label class="form-label fw-semibold small">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control" id="loginUsername" placeholder="Enter username"/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" id="loginPassword" placeholder="Enter password"/>
        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword')">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <button class="btn btn-primary w-100" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right me-2"></i>Login
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" class="d-none">
    <div class="mb-3">
      <label class="form-label fw-semibold small">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control" id="regUsername" placeholder="Choose a username"/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" id="regEmail" placeholder="your@email.com"/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" id="regPassword" placeholder="Choose a password"/>
      </div>
    </div>
    <button class="btn btn-primary w-100" onclick="doRegister()">
      <i class="bi bi-person-plus me-2"></i>Create Account
    </button>
  </div>

</div>

<script>
const API = "http://127.0.0.1:8000/api";

// ── Switch between Login / Register tabs ───────
function switchTab(tab) {
  document.getElementById("loginForm").classList.toggle("d-none",    tab !== "login");
  document.getElementById("registerForm").classList.toggle("d-none", tab !== "register");
  document.getElementById("loginTab").classList.toggle("active",     tab === "login");
  document.getElementById("registerTab").classList.toggle("active",  tab === "register");
  hideAlert();
}

// ── Show/hide password ─────────────────────────
function togglePassword(id) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

// ── Alert helpers ──────────────────────────────
function showAlert(msg, type) {
  const box = document.getElementById("alertBox");
  box.className = `alert alert-${type} py-2 small`;
  box.textContent = msg;
  box.classList.remove("d-none");
}
function hideAlert() {
  document.getElementById("alertBox").classList.add("d-none");
}

// ── LOGIN ──────────────────────────────────────
async function doLogin() {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;

  if (!username || !password) {
    showAlert("Please enter username and password.", "warning");
    return;
  }

  try {
    // Login requires form-encoded data (not JSON)
    const body = new URLSearchParams({ username, password });

    const res = await fetch(`${API}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.access_token);
      showAlert("Login successful! Redirecting…", "success");
      setTimeout(() => { window.location.href = "index.html"; }, 1000);
    } else {
      showAlert(data.detail || "Invalid credentials.", "danger");
    }
  } catch (err) {
    showAlert("Network error. Is the backend running?", "danger");
  }
}

// ── REGISTER ───────────────────────────────────
async function doRegister() {
  const username = document.getElementById("regUsername").value.trim();
  const email    = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value;

  if (!username || !email || !password) {
    showAlert("Please fill in all fields.", "warning");
    return;
  }

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (res.ok) {
      showAlert("Account created! Please login.", "success");
      setTimeout(() => switchTab("login"), 1500);
    } else {
      showAlert(data.detail || "Registration failed.", "danger");
    }
  } catch (err) {
    showAlert("Network error. Is the backend running?", "danger");
  }
}

// ── If already logged in, skip to dashboard ────
if (localStorage.getItem("token")) {
  window.location.href = "index.html";
}

// ── Allow Enter key to submit ──────────────────
document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const isLogin = !document.getElementById("loginForm").classList.contains("d-none");
    isLogin ? doLogin() : doRegister();
  }
});
</script>
</body>
</html>
